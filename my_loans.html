{% extends "base.html" %}
{% block content %}
  <h2>Peminjaman Saya</h2>
  <table class="table">
    <thead>
      <tr><th>Buku</th><th>Status</th><th>Tanggal Pinjam</th></tr>
    </thead>
    <tbody>
      {% for loan in loans %}
        <tr>
          <td>{{ loan.book.title }}</td>
          <td>{{ loan.get_status_display }}</td>
          <td>{{ loan.borrowed_at|date:"d M Y H:i" }}</td>
        </tr>
      {% empty %}
        <tr><td colspan="3">Belum ada peminjaman.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
